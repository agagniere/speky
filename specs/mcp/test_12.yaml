kind: tests
category: functional
tests:
- id: TMCP043
  ref: [MCP012]
  short: project loading uses checked-in manifest
  long: |
    Start the MCP server with `--project` and verify it loads the YAML sources declared
    by the checked-in `speky.toml` manifest instead of requiring explicit YAML paths.
  initial: |
    The current repository contains:
    - a checked-in `speky.toml` manifest with `project.name = "demo"`
    - manifest-defined YAML sources for requirements, tests and comments
    - requirements `RF10` and `RF11`
    - tests `T10` and `T11`
    - a direct tagged code mention of requirement `RF10` from non-test code
    - a direct tagged code mention of test `T11` from non-test code
  steps:
  - action: Start the MCP server with project name `demo`
    run: speky-mcp --project demo
    expected: |
      speky_mcp     INFO  Loading [...]
      [...]
      speky_mcp     INFO  Specifications loaded successfully
      speky_mcp     INFO  MCP server ready, waiting for requests
  - action: Verify the server started without explicit YAML file arguments

- id: TMCP044
  ref: [MCP013]
  short: search_requirements filters by lifecycle stage
  long: |
    Call `search_requirements` with a `stage` filter and verify only requirements
    with the requested lifecycle stage are returned.
  prereq: [TMCP043]
  steps:
  - action: The client calls `search_requirements` with stage `approved`
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "search_requirements",
          "arguments": {"stage": "approved"}
        }
      }
  - action: Verify only requirements at stage `approved` are returned, and each summary includes the stage
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "requirements": [
              {"category": "functional", "id": "RF10", "short": "Approved requirement", "stage": "approved"}
            ]
          }
        }
      }

- id: TMCP045
  ref: [MCP003, MCP017]
  short: get_requirement returns stage and code mentions
  long: |
    Call `get_requirement` for a requirement that has a lifecycle stage and a direct tagged
    code mention.
  prereq: [TMCP043]
  steps:
  - action: The client calls `get_requirement` for requirement `RF10`
    sample_lang: json
    sample: |
      {
        "id": 3,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "get_requirement",
          "arguments": {"id": "RF10"}
        }
      }
  - action: Verify the response contains both `stage` and `mentioned_in_code_by`
    sample_lang: json
    sample: |
      {
        "id": 3,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "id": "RF10",
            "category": "functional",
            "long": "Approved requirement",
            "stage": "approved",
            "tested_by": [{"id": "T10"}],
            "mentioned_in_code_by": [
              {
                "language": "python",
                "line": 3,
                "path": "src/feature.py",
                "project": "demo",
                "symbol": "feature_entrypoint"
              }
            ]
          }
        }
      }

- id: TMCP050
  ref: [MCP004, MCP017]
  short: get_test returns generic code mentions
  long: |
    Call `get_test` for a Speky test that is tagged from non-test code and verify the generic
    code mention appears in `mentioned_in_code_by`.
  prereq: [TMCP043]
  steps:
  - action: The client calls `get_test` for test `T11`
    sample_lang: json
    sample: |
      {
        "id": 4,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "get_test",
          "arguments": {"id": "T11"}
        }
      }
  - action: Verify the response contains `mentioned_in_code_by` for the direct tagged code mention
    sample_lang: json
    sample: |
      {
        "id": 4,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "id": "T11",
            "category": "functional",
            "long": "Specification only",
            "stage": "approved",
            "mentioned_in_code_by": [
              {
                "language": "python",
                "line": 6,
                "path": "src/feature.py",
                "project": "demo",
                "symbol": "speky_lookup"
              }
            ]
          }
        }
      }

