- id: TMCP051
  ref: [MCP012]
  short: least_tested_requirements ignores negative count
  long: A negative count value shall be ignored and all requirements shall be returned.
  prereq: [TMCP003]
  steps:
  - action: The client calls `least_tested_requirements` with count `-1`
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "least_tested_requirements",
          "arguments": {"count": -1}
        }
      }
  - action: Verify all requirements are returned as if count were not specified
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "requirements": [
              {"id": "RF04", "category": "non-functional", "test_plans": 0, "automated_test_plans": 0},
              {"id": "RF01", "category": "functional", "test_plans": 1, "automated_test_plans": 0},
              {"id": "RF02", "category": "functional", "short": "Second", "test_plans": 1, "automated_test_plans": 0},
              {"id": "RF03", "category": "non-functional", "short": "Number 3", "test_plans": 2, "automated_test_plans": 1}
            ]
          }
        }
      }

- id: TMCP052
  ref: [MCP012]
  short: least_tested_requirements ignores count larger than result set
  long: A count larger than the number of available requirements shall be ignored and all requirements shall be returned.
  prereq: [TMCP003]
  steps:
  - action: The client calls `least_tested_requirements` with count `9999`
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "least_tested_requirements",
          "arguments": {"count": 9999}
        }
      }
  - action: Verify all requirements are returned as if count were not specified
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "requirements": [
              {"id": "RF04", "category": "non-functional", "test_plans": 0, "automated_test_plans": 0},
              {"id": "RF01", "category": "functional", "test_plans": 1, "automated_test_plans": 0},
              {"id": "RF02", "category": "functional", "short": "Second", "test_plans": 1, "automated_test_plans": 0},
              {"id": "RF03", "category": "non-functional", "short": "Number 3", "test_plans": 2, "automated_test_plans": 1}
            ]
          }
        }
      }

- id: TMCP044
  ref: [MCP004]
  short: get_test includes code references with is_test flag
  long: |
    When code sources are declared in the manifest and a test has been
    tagged in source code, `get_test` shall include a `code_references`
    field with file, line, symbol, and an `is_test` boolean indicating
    whether the tagged symbol is an automated test implementation.
  prereq: [TMCP003]
  steps:
  - action: Call `get_test` for a test that has code references
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "get_test",
          "arguments": {"id": "T01"}
        }
      }
  - action: |
      Verify the response includes `code_references` with `is_test` set to true
      for automated test functions, and false for non-test symbols.
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "category": "functional",
            "id": "T01",
            "long": "The first test",
            "ref": [{"id": "RF01"}],
            "steps": [],
            "code_references": [
              {"file": "tests/test_feature.py", "line": 12, "symbol": "test_my_function", "is_test": true}
            ]
          }
        }
      }
