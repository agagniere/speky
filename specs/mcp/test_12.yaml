  ref: [MCP017]
  short: get_requirement returns generic code mentions
  long: |
    Call `get_requirement` for a requirement that is directly tagged from code and verify the
    generic code mention appears in `mentioned_in_code_by`.
  prereq: [TMCP043]
  steps:
  - action: The client calls `get_requirement` for requirement `RF10`
    sample_lang: json
    sample: |
      {
        "id": 5,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "get_requirement",
          "arguments": {"id": "RF10"}
        }
      }
  - action: Verify the response contains `mentioned_in_code_by` for the direct tagged code mention
    sample_lang: json
    sample: |
      {
        "id": 5,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "id": "RF10",
            "mentioned_in_code_by": [
              {
                "language": "python",
                "line": 3,
                "path": "src/feature.py",
                "project": "demo",
                "symbol": "feature_entrypoint"
              }
            ]
          }
        }
      }

- id: TMCP049
  ref: [MCP016]
  short: search_tests filters by lifecycle stage
  long: |
    Call `search_tests` with a `stage` filter and verify only tests
    with the requested lifecycle stage are returned.
  prereq: [TMCP043]
  steps:
  - action: The client calls `search_tests` with stage `implemented`
    sample_lang: json
    sample: |
      {
        "id": 6,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "search_tests",
          "arguments": {"stage": "implemented"}
        }
      }
  - action: Verify only tests at stage `implemented` are returned, and each summary includes the stage
    sample_lang: json
    sample: |
      {
        "id": 6,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "tests": [
              {"category": "functional", "id": "T10", "short": "Implemented test", "stage": "implemented"}
            ]
          }
        }
      }
