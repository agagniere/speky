kind: tests
category: functional
tests:
- id: TMCP032
  ref: [MCP010]
  short: test_plan_coverage partitions requirements into coverage buckets
  long: Call test_plan_coverage with no filter and verify requirements are correctly partitioned
  prereq: [TMCP003]
  steps:
  - action: The client calls `test_plan_coverage` with no arguments
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "test_plan_coverage",
          "arguments": {}
        }
      }
  - action: |
      Verify the response partitions requirements into four groups:
      - RF04 has no tests: `no_test_plan`
      - RF01 and RF02 have only manual tests: `manual_test_plan`
      - RF03 has one automated test (T04) and one manual test (T03): `partially_manual_test_plan`
      - `automated_test_plan` is empty
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "no_test_plan": [
              {"category": "non-functional", "id": "RF04"}
            ],
            "manual_test_plan": [
              {"category": "functional", "id": "RF01"},
              {"category": "functional", "id": "RF02"}
            ],
            "partially_manual_test_plan": [
              {"category": "non-functional", "id": "RF03", "short": "Number 3", "tags": ["foo", "bar:baz"]}
            ],
            "automated_test_plan": []
          }
        }
      }

- id: TMCP033
  ref: [MCP010]
  short: test_plan_coverage filtered by category
  long: Call test_plan_coverage with a category filter and verify only requirements from that category appear
  prereq: [TMCP003]
  steps:
  - action: The client calls `test_plan_coverage` with category `non-functional`
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "test_plan_coverage",
          "arguments": {"category": "non-functional"}
        }
      }
  - action: |
      Verify only non-functional requirements appear:
      RF04 in `no_test_plan`, RF03 in `partially_manual_test_plan`
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "no_test_plan": [
              {"category": "non-functional", "id": "RF04"}
            ],
            "manual_test_plan": [],
            "partially_manual_test_plan": [
              {"category": "non-functional", "id": "RF03", "short": "Number 3", "tags": ["foo", "bar:baz"]}
            ],
            "automated_test_plan": []
          }
        }
      }

- id: TMCP034
  ref: [MCP010]
  short: test_plan_coverage filtered to category with no gaps
  long: Call test_plan_coverage filtered by a category where all requirements have tests
  prereq: [TMCP003]
  steps:
  - action: The client calls `test_plan_coverage` with category `functional`
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "test_plan_coverage",
          "arguments": {"category": "functional"}
        }
      }
  - action: Verify RF01 and RF02 appear in `manual_test_plan` and all other buckets are empty
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "structuredContent": {
            "no_test_plan": [],
            "manual_test_plan": [
              {"category": "functional", "id": "RF01"},
              {"category": "functional", "id": "RF02"}
            ],
            "partially_manual_test_plan": [],
            "automated_test_plan": []
          }
        }
      }

- id: TMCP035
  ref: [MCP010]
  short: test_plan_coverage errors on unknown category
  long: |
    The user shall receive a tool execution error when filtering by a category
    that does not exist in the loaded specifications.
  prereq: [TMCP003]
  steps:
  - action: The client calls `test_plan_coverage` with a non-existent category
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "method": "tools/call",
        "params": {
          "name": "test_plan_coverage",
          "arguments": {"category": "nonexistent"}
        }
      }
  - action: Verify a tool execution error is returned indicating the category was not found
    sample_lang: json
    sample: |
      {
        "id": 2,
        "jsonrpc": "2.0",
        "result": {
          "isError": true,
          "structuredContent": {
            "error": "Category 'nonexistent' not found"
          }
        }
      }
