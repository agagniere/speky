kind: requirements
category: non-functional
requirements:
- id: SN001
  ref: [SF001]
  short: Format is YAML or TOML
  long: |
    The requirements, functional tests and comments can be written in YAML or TOML format.
  properties:
    version: 3
- id: SN002
  ref: [SF001]
  short: Do not constraint file names
  long: |
    Requirements can be split in any number of files.

    More specifically, there can be any number of requirement files, test files and comment files,
    the filename of which can be anything.

    The type of a file is determined by the `kind` top-level field, not the filename.
  properties:
    version: 2
- id: SN003
  long: It should be possible to edit specifications without deep knowledge of git.
- id: SN004
  short: Offline development
  long: It should be possible to generate the PDF output without an internet connection
- id: SN005
  ref: [SF006]
  short: Apply fields to lists of comments
  long: It should be possible to set a default value to comment fields in the same comment file
  tags: [input]
- id: SN006
  ref: [SF016]
  short: Use tree-sitter for code scanning
  long: |
    Code scanning shall use tree-sitter to parse source files into an AST, extracting
    comment nodes and correlating them with the symbol they document.

    This avoids custom parsing logic and correctly handles language-specific constructs
    such as Python docstrings, Rust doc comments (`///`), and C preprocessor directives.

    Each supported language requires its corresponding tree-sitter grammar package
    (`tree-sitter-python`, `tree-sitter-go`, `tree-sitter-rust`).
