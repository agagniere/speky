kind: requirements
category: functional
requirements:
- id: SF001
  short: Write requirements
  long: |
    The user shall be able to write requirements and functional tests in a textual format.

    A requirement is a combination of:
      - a unique identifier
      - a statement
      - the summary of the statement in a few words (optional)

    A test is constituted by:
      - one or more requirements that it validates at least partially
      - A procedure to follow, with instructions and expected behaviors / outputs
  tags: [input]
  properties:
    version: 2
- id: SF002
  short: PDF output
  long: |
    The user shall be able to read the specifications as a PDF document.

    Each requirement shall appear as a section containing the various informations listed in `SF001`,
    but also which tests validate this requirement and which other requirements refer to it.
  tags: ['output:pdf']
  properties:
    version: 2
- id: SF003
  short: HTML output
  long: The user shall be able to read the specifications as a static website
  tags: ['output:html']
- id: SF004
  short: Version controlled
  long: The user shall be able to rollback changes, view previous versions, review changes
  tags: [versioning]
- id: SF005
  short: Differential PDF
  long: The user shall be able to obtain a differential PDF highlighting the differences between a version and the previous
  tags:
    - output:pdf
    - versioning
    - todo
- id: SF006
  short: Support comments
  long: The user shall be able to add comments to a specification and to tests
  tags: [input]
- id: SF007
  short: Index requirements by tags
  long: The user shall be able add tags to requirements, and the outputs will contain the list of requirements for each tag
  tags: [output:both]
- id: SF008
  short: Quote client requirement
  client_statement: We need to be able to read the original statement a requirement is based on
  long: The user shall be able to provide a variant of a requirement, as it was worded by the client. It shall be displayed atop the requirement, in the style of a quote.
  tags: [input]
- id: SF010
  short: CSV for comments
  long: |
    The user shall be able to provide a CSV for the `comments` kind of input file.

    The first row must specify the field of the column, valid values are:
    - `date`
    - `from`
    - `external`
    - `about`
    - `text`

    The `external` column must contain booleans, either `true`, `false`, `1` or `0`.
  tags: [input:formats]
- id: SF011
  short: "Support free key:value"
  client_statement: We may want to associate a version to a requirement, as well as an author
  long: |
    The user shall be able to associate arbitrary "key:value" items to a requirement. It shall appear below the requirement.

    This allows having project-specific fields.
  tags: [input]
  properties:
    version: 1
    author: Gloutch
    since: '`0.1.0`'
- id: SF012
  short: Input file validation
  long: The user shall be able to validate that an input file is valid, without having to generate an output.
  tags: [tooling]
  properties:
    since: '`0.1.0`'
- id: SF013
  short: Parameterized tags
  ref: [SF007]
  long: |
    The user shall be able to group and nest tags one level:
    a tag can have a subtag with the syntax `group:subtag`.
  tags: [output:both]
  properties:
    since: '`0.1.0`'
- id: SF014
  short: Project manifest
  long: |
    The user shall be able to group all input files of a project in a single manifest file,
    and pass that manifest to the speky CLI instead of listing individual files.

    A manifest is a YAML or TOML file with `kind: project` containing:
    - `name`: the project identifier, used as the namespace in reference tags
      (e.g. `speky:my-project#SF001`)
    - `files`: a list of glob patterns matching specification files to load
    - `root_directory`: an optional path relative to the manifest, used as the base for
      glob patterns and displayed file paths (defaults to the manifest's own directory)
    - `comments_csvs`: an optional list of glob patterns for CSV comment files

    When a manifest is loaded, all matched files are loaded in sorted order.
  tags: [input, tooling]
  ref: [SF001, SF012]
- id: SF015
  short: Code sources in manifest
  long: |
    The user shall be able to list code source directories in the project manifest,
    so that Speky can scan them for references to requirements and tests.

    The manifest shall accept an optional `code_sources` field: a list of glob patterns
    relative to `root_directory`.

    Example:
    ```yaml
    kind: project
    name: my-project
    files:
      - specs/*.yaml
    code_sources:
      - src/**/*.py
      - tests/**/*.py
    ```
  tags: [input, tooling]
  ref: [SF014]
- id: SF017
  short: Source links in manifest
  long: |
    The user shall be able to declare a `source_links` section in the project manifest
    to enable clickable links from code references to the corresponding lines in the
    hosted repository (GitHub, GitLab, Codeberg, or any compatible platform).

    The `source_links` section shall accept:
    - `url`: the base URL of the repository (e.g. `https://github.com/owner/repo`).
      The special value `auto` instructs Speky to detect it by running
      `git remote get-url origin` and normalizing the result to an HTTPS URL.
    - `branch`: the branch or ref used to build links (e.g. `main`).
      The special value `auto` instructs Speky to detect the current branch by running
      `git rev-parse --abbrev-ref HEAD`.
      Defaults to `auto` when omitted.

    Generated links shall have the form:
    `{url}/blob/{branch}/{path_from_git_root}#L{line}`

    Example:
    ```yaml
    source_links:
      url: https://github.com/owner/repo
      branch: main
    ```

    With auto-detection:
    ```yaml
    source_links:
      url: auto
    ```
  tags: [input, tooling]
  ref: [SF015, SF016]
- id: SF016
  short: Scan code for requirement references
  long: |
    When `code_sources` are declared, Speky shall scan them for comments containing a
    reference tag of the form `speky:<name>#<ID>`, where `<name>` matches the manifest's
    `name` field. Tags in other namespaces shall be silently ignored.

    Each discovered reference shall record the target ID, file path, line number, and
    symbol name.

    Supported languages: Python (`.py`), Go (`.go`), Rust (`.rs`).
  tags: [tooling]
  ref: [SF015]
